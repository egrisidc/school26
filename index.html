function PayForm({ payments, onAdd, accentColor }) {
const today = new Date().toISOString().slice(0,10);
const [year,   setYear]   = useState(“2026”);
const [month,  setMonth]  = useState(””);
const [amount, setAmount] = useState(“60”);
const [date,   setDate]   = useState(today);
const [desc,   setDesc]   = useState(””);
const [err,    setErr]    = useState(””);

const months = year === “2026” ? SM26 : SM25;
const col    = accentColor || “#10B981”;

const submit = () => {
if (!month)  { setErr(“თვე სავალდებულოა”); return; }
if (!amount || isNaN(Number(amount)) || Number(amount) <= 0) { setErr(“სწორი თანხა შეიყვანეთ”); return; }
if (!date)   { setErr(“თარიღი სავალდებულოა”); return; }
const already = payments.find(p => p.year===Number(year) && p.month===month);
if (already) { setErr(month+” “+year+” უკვე გადახდილია”); return; }
const newPay = {
id:    “p” + Date.now(),
year:  Number(year),
month,
amount: Number(amount),
date,
desc: desc.trim(),
};
onAdd(newPay);
setMonth(””); setAmount(“60”); setDate(today); setDesc(””); setErr(””);
};

return (
<div style={{background:”#F8FAFC”,borderRadius:12,padding:“14px 16px”,border:“1px solid #E2E8F0”}}>
<div style={{fontSize:12,fontWeight:800,color:”#374151”,marginBottom:12}}>➕ გადახდის დამატება</div>
{err && <div style={{fontSize:11,color:”#DC2626”,background:”#FEF2F2”,border:“1px solid #FECACA”,borderRadius:8,padding:“6px 10px”,marginBottom:10}}>{err}</div>}
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:9}}>
<div>
<label style={LS}>სასწ. წელი</label>
<select value={year} onChange={e => { setYear(e.target.value); setMonth(””); }} style={IS}>
<option value="2026">2025–2026</option>
<option value="2025">2024–2025</option>
</select>
</div>
<div>
<label style={LS}>თვე</label>
<select value={month} onChange={e => setMonth(e.target.value)} style={IS}>
<option value="">— აირჩიეთ —</option>
{months.map(m => {
const paid = payments.find(p => p.year===Number(year) && p.month===m);
return <option key={m} value={m} disabled={!!paid}>{m}{paid?” ✓”:””}</option>;
})}
</select>
</div>
<div>
<label style={LS}>თანხა (₾)</label>
<input type=“number” min=“1” value={amount} onChange={e => setAmount(e.target.value)} style={IS} placeholder=“60” />
</div>
<div>
<label style={LS}>გადახდის თარიღი</label>
<input type=“date” value={date} onChange={e => setDate(e.target.value)} style={IS} />
</div>
<div style={{gridColumn:“1/-1”}}>
<label style={LS}>აღწერა (არასავალდებულო)</label>
<input value={desc} onChange={e => setDesc(e.target.value)} style={IS} placeholder=“მაგ: ნაღდი, გადარიცხვა, ა.შ.” />
</div>
</div>
<button onClick={submit} style={{marginTop:10,width:“100%”,padding:“9px 0”,border:“none”,borderRadius:10,background:col,color:”#fff”,cursor:“pointer”,fontWeight:700,fontSize:13,fontFamily:“inherit”}}>
✅ გადახდის დამატება
</button>
</div>
);
}

            </div>
          </div>

      {/* PAYMENTS */}

        const tot26exp  = active.length * SM26.length * 60;
        const tot25exp  = active.length * SM25.length * 60;
        const paid26    = active.reduce((a,s) => a + s.payments.filter(p=>p.year===2026).reduce((b,p)=>b+p.amount,0), 0);

                ["2025-26",paid26.toLocaleString()+"₾","#3B82F6","#EFF6FF"],
                ["2024-25",paid25.toLocaleString()+"₾","#7C3AED","#F5F3FF"],

                <div key={l} style={{background:bg,border:"1px solid "+col+"22",borderRadius:14,padding:"13px 16px"}}>
                  <div style={{fontSize:11,color:col,fontWeight:700,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:22,fontWeight:900,color:col,lineHeight:1}}>{v}</div>

                  <div style={{fontSize:11,color:"#64748B",margin:"4px 0 8px"}}>მოსალოდ.: {exp.toLocaleString()}₾ · ვალი: {Math.max(0,exp-paid).toLocaleString()}₾</div>
                  <div style={{background:bar,borderRadius:6,height:8}}>
                    <div style={{background:col,height:8,borderRadius:6,width:Math.min(100,exp>0?paid/exp*100:0)+"%",transition:"width .5s"}} />
                  </div>
                  <div style={{fontSize:11,color:col,fontWeight:600,marginTop:4}}>{Math.round(exp>0?paid/exp*100:0)}% დაფარული</div>
                </div>
              ))}
            </div>

            {/* Monthly payment status — 2025-26 */}
            <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #E2E8F0",marginBottom:20}}>

                {SM26.map((m) => {
                  const cnt = active.filter(s => s.payments.find(p => p.year===2026 && p.month===m)).length;
                  const pct = active.length > 0 ? Math.round(cnt/active.length*100) : 0;
                  const col = pct >= 80 ? "#10B981" : pct >= 50 ? "#F59E0B" : "#DC2626";
                  return (
                    <div key={m} onClick={() => { setSelPayMonth({month:m,year:2026}); go("payments_month"); }}

                      onMouseEnter={e => { e.currentTarget.style.background=col+"12"; e.currentTarget.style.border="2px solid "+col+"44"; }}
                      onMouseLeave={e => { e.currentTarget.style.background="transparent"; e.currentTarget.style.border="2px solid transparent"; }}>
                      <div style={{fontSize:18,fontWeight:900,color:col}}>{cnt}</div>
                      <div style={{background:"#F1F5F9",borderRadius:4,height:5,marginBottom:3}}>
                        <div style={{background:col,height:5,borderRadius:4,width:pct+"%"}} />
                      </div>
                      <div style={{fontSize:9,color:"#64748B",lineHeight:1.2}}>{m.slice(0,4)}</div>
                      <div style={{fontSize:9,color:col,fontWeight:700}}>{pct}%</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* By division */}
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:13,color:"#0F172A",marginBottom:12}}>განყოფილებების მიხ. — 2025–2026</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {DIVISIONS.map(div => {
                  const ds    = active.filter(s => s.divisionId === div.id);
                  const paid  = ds.reduce((a,s) => a + s.payments.filter(p=>p.year===2026).reduce((b,p)=>b+p.amount,0), 0);
                  const exp   = ds.length * SM26.length * 60;
                  const pct   = exp > 0 ? Math.round(paid/exp*100) : 0;
                  const debt  = Math.max(0, exp-paid);
                  return (
                    <div key={div.id} style={{background:"#fff",borderRadius:11,padding:"11px 14px",border:"1px solid #E2E8F0"}}>

                        <span style={{fontSize:18,width:24,flexShrink:0}}>{div.emoji}</span>

                  <div key={div.id} style={{marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                      <span>{div.emoji}</span>

                      <Badge color={div.color}>{list.length}</Badge>

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>

                          <Ini name={s.lastName+" "+s.firstName} size={26} color="#DC2626" />
                          <div style={{flex:1,minWidth:0}}>

                            <div style={{fontSize:9,color:"#94A3B8"}}>{s.className}</div>
                          </div>
                          <span style={{fontSize:10,fontWeight:800,color:"#DC2626",flexShrink:0}}>60₾</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
              {unpaidMar.length === 0 && <div style={{textAlign:"center",padding:24,color:"#10B981",fontWeight:700}}>ყველამ გადაიხადა!</div>}
            </div>
          </div>
        );
      })()}

      {page === "payments_month" && selPayMonth && (() => {
        const {month, year} = selPayMonth;
        const monthIdx  = year===2026 ? SM26.indexOf(month) : SM25.indexOf(month);
        const allMonths = year===2026 ? SM26 : SM25;

        // გადახდილი ამ თვეში
        const paidList   = active.filter(s =>  s.payments.find(p => p.year===year && p.month===month)).sort((a,b)=>a.lastName.localeCompare(b.lastName));
        // გადაუხდელი ამ თვეში ან აქვს წინა დავალიანება
        const unpaidList = active.filter(s => {
          const noThisMonth = !s.payments.find(p => p.year===year && p.month===month);
          // წინა დავალიანება — ნებისმიერ წინა თვეში გამოტოვებული
          const prevMonths = allMonths.slice(0, monthIdx);
          const hasDebt    = prevMonths.some(m => !s.payments.find(p => p.year===year && p.month===m));
          return noThisMonth || hasDebt;
        }).sort((a,b)=>a.lastName.localeCompare(b.lastName));

        const pct = active.length > 0 ? Math.round(paidList.length/active.length*100) : 0;
        const col = pct >= 80 ? "#10B981" : pct >= 50 ? "#F59E0B" : "#DC2626";

        // pmView: null=overview, "paid"=გადახდილი სია, "unpaid"=გადაუხდელი სია
        const view = pmView;

          <div>

                      <div key={s.id} onClick={()=>setSelStudent(s)}

                          {showDebt && prevDebt.length>0 && (
                            <div style={{fontSize:10,color:"#F59E0B",fontWeight:700}}>{prevDebt.length*60}₾ ვ.</div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        );

        return (
          <div>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,flexWrap:"wrap"}}>
              {view
                ? <button onClick={()=>setPmView(null)} style={{background:"#F1F5F9",border:"none",borderRadius:10,padding:"7px 15px",cursor:"pointer",fontWeight:600,fontSize:13,color:"#374151",fontFamily:"inherit"}}>← {month} {year}</button>

                <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                  <button onClick={()=>prevMonth&&setSelPayMonth({month:prevMonth,year})} disabled={!prevMonth} style={{background:prevMonth?"#F1F5F9":"transparent",border:"none",borderRadius:8,padding:"5px 10px",cursor:prevMonth?"pointer":"default",color:prevMonth?"#374151":"#D1D5DB",fontFamily:"inherit",fontSize:14}}>‹</button>

              {view && <h2 style={{margin:0,fontSize:21,fontWeight:900,color:"#0F172A"}}>{view==="paid"?"✅ გადახდილი":"❌ გადაუხდელი / ვალი"} — {month} {year}</h2>}

                    ["გადახდილი", paidList.length,    "#10B981","#F0FDF4", "paid"],
                    ["გადაუხდ./ვალი", unpaidList.length, "#DC2626","#FEF2F2", "unpaid"],

                      onMouseLeave={e=>action&&(e.currentTarget.style.transform="none")}>
                      <div style={{fontSize:22,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
                      <div style={{fontSize:11,color:"#64748B",fontWeight:600,marginTop:3}}>{l}</div>

                    <div onClick={()=>setPmView("unpaid")} style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",paddingBottom:8,borderBottom:"2px solid #FEE2E2"}}

                      onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                      <span style={{fontSize:15}}>❌</span>

                    })}
                    {unpaidList.length===0&&<div style={{textAlign:"center",color:"#10B981",fontWeight:700,fontSize:12,padding:8}}>ყველამ გადაიხადა!</div>}
                  </div>

                  {/* PAID summary — clickable header */}
                  <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid #D1FAE5"}}>
                    <div onClick={()=>setPmView("paid")} style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",paddingBottom:8,borderBottom:"2px solid #D1FAE5"}}
                      onMouseEnter={e=>e.currentTarget.style.opacity=".75"}
                      onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                      <span style={{fontSize:15}}>✅</span>
                      <span style={{fontWeight:900,fontSize:13,color:"#10B981"}}>გადახდილი</span>
                      <Badge color="#10B981">{paidList.length}</Badge>
                      <span style={{color:"#10B981",marginLeft:"auto",fontSize:12}}>→</span>
                    </div>
                    {DIVISIONS.slice(0,4).map(div=>{
                      const n=paidList.filter(s=>s.divisionId===div.id).length;
                      if(!n) return null;
                      return <div key={div.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",color:"#374151"}}><span>{div.emoji} {div.name}</span><span style={{fontWeight:700,color:"#10B981"}}>{n}</span></div>;
                    })}

                </div>

            {view === "paid" && (
              <div>
                <div style={{background:"#F0FDF4",borderRadius:12,padding:"11px 16px",marginBottom:18,border:"1px solid #D1FAE5",display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:22,fontWeight:900,color:"#10B981"}}>{paidList.length}</span>
                  <div style={{fontSize:12,color:"#065F46"}}>მოსწ. გადაიხადა {month} {year} · სულ {(paidList.length*60).toLocaleString()}₾</div>

                <StudentListByDiv list={paidList} bgColor="#F0FDF4" borderColor="#D1FAE5" amountColor="#10B981" showDebt={false} />

                <div style={{background:"#FEF2F2",borderRadius:12,padding:"11px 16px",marginBottom:18,border:"1px solid #FECACA",display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:22,fontWeight:900,color:"#DC2626"}}>{unpaidList.length}</span>
                  <div style={{fontSize:12,color:"#991B1B"}}>მოსწ. — {month} {year} გადაუხდელი ან წინა დავალიანება</div>
                  <Badge color="#DC2626">{(unpaidList.reduce((a,s)=>{
                    const noThis = !s.payments.find(p=>p.year===year&&p.month===month)?60:0;
                    const prevD  = allMonths.slice(0,monthIdx).filter(m=>!s.payments.find(p=>p.year===year&&p.month===m)).length*60;
                    return a+noThis+prevD;
                  },0)).toLocaleString()}₾ ვალი</Badge>
                </div>
                <StudentListByDiv list={unpaidList} bgColor="#FFF5F5" borderColor="#FEE2E2" amountColor="#DC2626" showDebt={true} />
                {unpaidList.length===0 && <div style={{textAlign:"center",padding:60,color:"#10B981",fontWeight:800,fontSize:15}}>✅ ყველამ გადაიხადა!</div>}
              </div>
            )}

          </div>
        );
      })()}

      {/* EVENTS */}
      {page === "events" && !selEvent && (() => {
        const today    = new Date().toISOString().slice(0,10);
        const upcoming = events.filter(e => e.status==="upcoming" || e.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
        const past     = events.filter(e => e.status==="past"     || e.date <  today).sort((a,b)=>b.date.localeCompare(a.date));

        const newEvent = () => {
          const id = "ev"+Date.now();
          setEvents(evs => [...evs, {id, status:"upcoming", title:"ახალი ღონისძიება", venue:"", date:"", time:"", program:[], notes:""}]);
          setSelEvent(id);
        };

        const EV_TABS = [
          {k:"upcoming", label:"📅 მომავალი", cnt:upcoming.length},
          {k:"past",      label:"✅ ჩატარებული", cnt:past.length},
          {k:"archive",   label:"🗄 არქივი",    cnt:past.length},
        ];

        const EventCard = ({ev, accent}) => {
          const pCount = ev.program.length;
          const sIds   = [...new Set(ev.program.flatMap(n=>n.studentIds||[]))];
          return (
            <div onClick={()=>setSelEvent(ev.id)}
              style={{background:"#fff",borderRadius:16,padding:20,cursor:"pointer",border:"2px solid "+accent+"22",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",transition:"all 0.2s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 28px "+accent+"22";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.05)";}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:16,fontWeight:900,color:"#0F172A",marginBottom:4}}>{ev.title}</div>
                  <div style={{fontSize:12,color:"#64748B",display:"flex",gap:10,flexWrap:"wrap"}}>
                    {ev.date && <span>📅 {ev.date}</span>}
                    {ev.time && <span>🕐 {ev.time}</span>}
                    {ev.venue && <span>📍 {ev.venue}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  <Badge color={accent}>{pCount} ნომ.</Badge>
                  {sIds.length>0 && <Badge color="#64748B">{sIds.length} მოს.</Badge>}
                </div>
              </div>
              {ev.notes && <div style={{fontSize:11,color:"#94A3B8",fontStyle:"italic",marginTop:6,paddingTop:6,borderTop:"1px solid #F1F5F9"}}>{ev.notes}</div>}
            </div>
          );
        };

        return (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,gap:12,flexWrap:"wrap"}}>
              <h2 style={{margin:0,fontSize:22,fontWeight:900,color:"#0F172A"}}>🎭 ღონისძიებები</h2>
              <button onClick={newEvent} style={{background:"#0F172A",border:"none",borderRadius:10,padding:"9px 18px",cursor:"pointer",color:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7}}>
                ➕ ახალი ღონისძიება
              </button>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:4,marginBottom:22,background:"#fff",borderRadius:12,padding:5,border:"1px solid #E2E8F0",width:"fit-content"}}>
              {EV_TABS.filter((t,i)=> i<2 || evTab==="archive").map(t => (
                <button key={t.k} onClick={()=>setEvTab(t.k)}
                  style={{padding:"8px 16px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:evTab===t.k?700:500,background:evTab===t.k?"#0F172A":"transparent",color:evTab===t.k?"#fff":"#64748B",fontSize:12,fontFamily:"inherit",display:"flex",gap:6,alignItems:"center",whiteSpace:"nowrap"}}>
                  {t.label} <span style={{fontSize:11,opacity:.75}}>({t.cnt})</span>
                </button>
              ))}
              {evTab!=="archive" && (
                <button onClick={()=>setEvTab("archive")}
                  style={{padding:"8px 16px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:500,background:"transparent",color:"#64748B",fontSize:12,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                  🗄 არქივი ({past.length})
                </button>
              )}
            </div>

            {/* UPCOMING */}
            {evTab === "upcoming" && (
              <div>
                {upcoming.length === 0
                  ? <div style={{textAlign:"center",padding:60,color:"#94A3B8",fontSize:14}}>მომავალი ღონისძიება არ არის დაგეგმილი</div>
                  : <div style={{display:"flex",flexDirection:"column",gap:12}}>
                      {upcoming.map(ev => <EventCard key={ev.id} ev={ev} accent="#7C3AED" />)}
                    </div>
                }
              </div>
            )}

            {/* PAST */}
            {evTab === "past" && (
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {past.length===0
                  ? <div style={{textAlign:"center",padding:60,color:"#94A3B8",fontSize:14}}>ჩატარებული ღონისძიება არ არის</div>
                  : past.map(ev => <EventCard key={ev.id} ev={ev} accent="#059669" />)
                }
              </div>
            )}

            {/* ARCHIVE */}
            {evTab === "archive" && (
              <div>
                <div style={{fontSize:13,color:"#64748B",marginBottom:16}}>გასული ღონისძიებების სრული არქივი — {past.length} ჩანაწერი</div>
                {past.length===0
                  ? <div style={{textAlign:"center",padding:60,color:"#94A3B8",fontSize:14}}>არქივი ცარიელია</div>
                  : past.map(ev => {
                      const sIds = [...new Set(ev.program.flatMap(n=>n.studentIds||[]))];
                      return (
                        <div key={ev.id} onClick={()=>setSelEvent(ev.id)}
                          style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"#fff",borderRadius:12,border:"1px solid #E2E8F0",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}
                          onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"}
                          onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                          <div style={{width:44,height:44,borderRadius:10,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🎭</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:800,fontSize:14,color:"#0F172A"}}>{ev.title}</div>
                            <div style={{fontSize:11,color:"#64748B",marginTop:2,display:"flex",gap:10,flexWrap:"wrap"}}>
                              <span>📅 {ev.date}</span>
                              {ev.venue && <span>📍 {ev.venue}</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:6,flexShrink:0}}>
                            <Badge color="#059669">{ev.program.length} ნომ.</Badge>
                            {sIds.length>0 && <Badge color="#64748B">{sIds.length} მოს.</Badge>}
                          </div>
                          <span style={{color:"#D1D5DB",fontSize:18}}>›</span>
                        </div>
                      );
                    })
                }
              </div>
            )}
          </div>
        );
      })()}

      {/* EVENT DETAIL / EDIT */}
      {page === "events" && selEvent && (() => {
        const ev = events.find(e => e.id === selEvent);
        if (!ev) return null;
        return (
          <EventEditor
            key={selEvent}
            ev={ev}
            teachers={teachers}
            active={active}
            onBack={() => setSelEvent(null)}
            onDelete={() => { setEvents(evs => evs.filter(e => e.id !== selEvent)); setSelEvent(null); }}
            onSave={updated => { setEvents(evs => evs.map(e => e.id === selEvent ? updated : e)); db.upsertEvent(updated); }}
          />
        );
      })()}

    </main>
  </div>

  {selStudent && (
    <StudentCard student={students.find(s=>s.id===selStudent.id)||selStudent} onClose={() => setSelStudent(null)} onSave={saveS} />
  )}
  {selTeacher && (
    <TeacherCard teacher={teachers.find(t=>t.id===selTeacher.id)||selTeacher} onClose={() => setSelTeacher(null)} onSave={saveT} allStudents={students} onSaveStudent={saveS} />
  )}
  {showExcelImport && (
    <ExcelImportPanel
      students={students}
      onImport={rows => { bulkAddPayments(rows); }}
      onClose={() => setShowExcelImport(false)}
    />
  )}
</div>

);

root.render(React.createElement(App));
