<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* 1. შენი ორიგინალი დიზაინი (Variables & Base) */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}
* { box-sizing:border-box; margin:0; padding:0; outline:none; font-family:'Noto Sans Georgian', sans-serif; }
body { background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; font-size:14px; }

/* 2. შენი ორიგინალი სტრუქტურა (Sidebar, Main, AI Chat) */
#sidebar { width:220px; min-width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; transition: all 0.3s; }
.sidebar-logo { padding:20px 16px 16px; border-bottom:1px solid var(--border); position:relative; }
.sidebar-logo .school-num { font-size:28px; font-weight:700; color:var(--accent); line-height:1; }
.sidebar-nav { flex:1; padding:12px 8px; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px; color:var(--text2); transition:all .15s; margin-bottom:1px; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--accent); color:#fff; }

#main { flex:1; display:flex; flex-direction:column; background:var(--bg); overflow:hidden; position:relative; }
#content { flex:1; overflow-y:auto; padding:24px; }

/* 3. AI CHAT - შენი ორიგინალი სტილი */
#ai-chat { position:fixed; bottom:24px; right:24px; width:320px; height:400px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); display:flex; flex-direction:column; box-shadow:var(--shadow); z-index:1000; overflow:hidden; transform: translateY(0); transition: 0.3s ease; }
#ai-chat.minimized { height: 48px; width: 200px; }
.ai-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.ai-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; }
.ai-input-area { padding: 8px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

/* 4. AUTH OVERLAY */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; }
.auth-card input { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: 8px; }

/* 5. შენი სხვა ორიგინალი კლასები (Table, Modal, Badges...) */
.table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { background:var(--surface2); padding:12px 16px; text-align:left; font-size:11px; color:var(--text3); text-transform:uppercase; border-bottom:1px solid var(--border); }
.data-table td { padding:12px 16px; border-bottom:1px solid var(--border); color:var(--text); }
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--accent); margin-bottom:10px;">№26 მართვის სისტემა</h2>
        <p style="color:var(--text2); font-size:12px; margin-bottom:20px;">ავტორიზაცია</p>
        <input type="email" id="u-email" placeholder="ელ-ფოსტა">
        <input type="password" id="u-pass" placeholder="პაროლი">
        <button onclick="handleSignIn()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700;">შესვლა</button>
        <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app-wrapper" style="display:none; width:100%; height:100vh;">
    <aside id="sidebar">
        <div class="sidebar-logo"><div class="school-num">№26</div><div style="font-size:11px; color:var(--text3)">მართვის პანელი</div></div>
        <div class="sidebar-nav">
            <div class="nav-item active" onclick="showView('dashboard', this)">📊 სტატისტიკა</div>
            <div class="nav-item" onclick="showView('departments', this)">🏛️ განყოფილებები</div>
            <div class="nav-item" onclick="showView('students', this)">👥 მოსწავლეები</div>
            <div class="nav-item" onclick="showView('teachers', this)">👩‍🏫 პედაგოგები</div>
            <div class="nav-item" onclick="showView('finance', this)">💰 გადახდები</div>
        </div>
        <div style="padding:16px; border-top:1px solid var(--border); color:var(--text3); font-size:12px; cursor:pointer;" onclick="logout()">🚪 სისტემიდან გამოსვლა</div>
    </aside>

    <main id="main">
        <div id="content">
            <div id="view-dashboard" class="view active">
                <div id="dash-stats-row" class="stats-row" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:20px;"></div>
                <div style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border);">
                    <canvas id="chart-main" height="120"></canvas>
                </div>
            </div>

            <div id="view-students" class="view">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h2>მოსწავლეთა ბაზა</h2>
                    <button onclick="addStudent()" style="padding:8px 16px; background:var(--accent); border:none; border-radius:8px; color:white; cursor:pointer;">+ დამატება</button>
                </div>
                <div class="table-wrap"><table class="data-table"><thead><tr><th>სახელი</th><th>გვარი</th><th>სქესი</th><th>სტატუსი</th></tr></thead><tbody id="students-list"></tbody></table></div>
            </div>
            
            </div>

        <div id="ai-chat">
            <div class="ai-header" onclick="this.parentElement.classList.toggle('minimized')">
                <span>🤖 AI ასისტენტი</span>
                <span>▼</span>
            </div>
            <div class="ai-messages" id="ai-messages"></div>
            <div class="ai-input-area">
                <input type="text" id="ai-input" style="flex:1; background:var(--surface3); border:1px solid var(--border); color:white; padding:8px; border-radius:6px;" placeholder="მკითხე რამე...">
                <button onclick="aiAsk()" style="background:var(--accent); border:none; color:white; padding:0 12px; border-radius:6px;">🚀</button>
            </div>
        </div>
    </main>
</div>

<script>
// --- CORE CONFIG (SUPABASE) ---
const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- შენი ორიგინალი მონაცემების სტრუქტურა ---
let students = [], teachers = [], departments = [], payments = [];

window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'flex';
        await loadAllData();
    }
};

async function handleSignIn() {
    const email = document.getElementById('u-email').value;
    const pass = document.getElementById('u-pass').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    if (error) document.getElementById('err').innerText = "წვდომა უარყოფილია!";
    else location.reload();
}

async function loadAllData() {
    const { data: cloud } = await _supabase.from('school_configs').select('data').eq('config_name', 'full_backup').maybeSingle();
    if (cloud && cloud.data) {
        students = cloud.data.students || [];
        teachers = cloud.data.teachers || [];
        departments = cloud.data.departments || [];
        payments = cloud.data.payments || [];
    }
    renderUI();
}

async function saveAllData() {
    await _supabase.from('school_configs').upsert({
        config_name: 'full_backup',
        data: { students, teachers, departments, payments }
    });
}

// --- შენი ორიგინალი RENDER ლოგიკა ---
function renderUI() {
    // Stats
    document.getElementById('dash-stats-row').innerHTML = `
        <div class="stat-card" style="background:var(--surface); border:1px solid var(--border); padding:15px; border-radius:12px;">
            <div class="stat-label">მოსწავლე</div><div class="stat-value" style="font-size:24px; font-weight:700;">${students.length}</div>
        </div>
        <div class="stat-card" style="background:var(--surface); border:1px solid var(--border); padding:15px; border-radius:12px;">
            <div class="stat-label">პედაგოგი</div><div class="stat-value" style="font-size:24px; font-weight:700;">${teachers.length}</div>
        </div>
    `;

    // Students Table
    document.getElementById('students-list').innerHTML = students.map(s => `
        <tr>
            <td>${s.firstName}</td><td>${s.lastName}</td>
            <td><span style="color:${s.gender==='male'?'var(--boy)':'var(--girl)'}">${s.gender==='male'?'♂':'♀'}</span></td>
            <td><span style="color:var(--green)">აქტიური</span></td>
        </tr>
    `).join('');

    initChart();
}

function initChart() {
    const ctx = document.getElementById('chart-main').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['იან', 'თებ', 'მარ', 'აპრ'],
            datasets: [{
                label: 'მოსწავლეები',
                data: [students.length-2, students.length-1, students.length, students.length],
                borderColor: '#4f8ef7',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(79, 142, 247, 0.1)'
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

// --- შენი ორიგინალი AI ლოგიკა ---
function aiAsk() {
    const q = document.getElementById('ai-input').value;
    if(!q) return;
    const msgDiv = document.getElementById('ai-messages');
    msgDiv.innerHTML += `<div style="margin-bottom:10px; color:var(--text2)">👤 ${q}</div>`;
    
    // შენი ორიგინალი AI პასუხების ლოგიკა
    let reply = "უკაცრავად, ამაზე ინფორმაცია არ მაქვს.";
    if(q.includes('მოსწავლე')) reply = `სისტემაში არის ${students.length} მოსწავლე.`;
    if(q.includes('გამარჯობა')) reply = "გამარჯობა, მე სკოლის AI ასისტენტი ვარ! 🏫";

    msgDiv.innerHTML += `<div style="margin-bottom:10px; color:var(--accent)">🤖 ${reply}</div>`;
    document.getElementById('ai-input').value = '';
    msgDiv.scrollTop = msgDiv.scrollHeight;
}

function showView(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

function addStudent() {
    const f = prompt("სახელი:");
    const l = prompt("გვარი:");
    if(f && l) {
        students.push({ firstName: f, lastName: l, gender: 'male' });
        saveAllData();
        renderUI();
    }
}

async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
