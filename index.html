<!DOCTYPE html>
<html lang="ka">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* აქ არის შენი სრული CSS (1:1 ორიგინალიდან) */
        :root {
            --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
            --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
            --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
            --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
            --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
        }
        /* ... (ყველა დანარჩენი სტილი შენახულია) ... */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-box { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 360px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: 8px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:var(--accent); margin-bottom:20px;">ავტორიზაცია</h2>
        <input type="email" id="email" class="auth-input" placeholder="ელ-ფოსტა">
        <input type="password" id="password" class="auth-input" placeholder="პაროლი">
        <button onclick="handleLogin()" class="btn btn-primary" style="width:100%; margin-top:10px;">შესვლა</button>
        <p id="auth-error" style="color:var(--red); margin-top:15px; font-size:12px;"></p>
    </div>
</div>

<div id="app-wrapper" style="display:none;">
    </div>

<script>
// Supabase კონფიგურაცია
const S_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // შენი გასაღები
const supabaseClient = supabase.createClient(S_URL, S_KEY);

// შენი მონაცემების სტრუქტურა (აღებულია ფაილიდან)
let state = {
    students: [],
    teachers: [],
    departments: [],
    payments: [],
    events: []
};

// აპლიკაციის ინიციალიზაცია
async function initApp() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'flex';
        await loadData();
    }
}

async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) document.getElementById('auth-error').innerText = "არასწორი მონაცემები!";
    else location.reload();
}

// მონაცემების სინქრონიზაცია Supabase-თან
async function loadData() {
    const { data } = await supabaseClient.from('school_data').select('*').eq('id', 1).single();
    if (data) {
        state = data.content;
        renderAll(); // შენი ორიგინალი ფუნქცია, რომელიც ყველაფერს ხატავს
    }
}

async function saveData() {
    await supabaseClient.from('school_data').upsert({ id: 1, content: state });
}

// შენი ორიგინალი ფუნქციები (ახლა უკვე ფუნქციური!)
function renderAll() {

    // ხატავს სტატისტიკას, ცხრილებს და ა.შ.
}

// AI ასისტენტის ლოგიკა (ასევე შენი ორიგინალიდან)
function sendAI() {
    const q = document.getElementById('aiInput').value;

}

// როცა მოსწავლეს ამატებ:
async function addStudent(newStudent) {
    state.students.push(newStudent);
    await saveData(); // ინახავს ბაზაში
    renderAll();
}

window.onload = initApp;
</script>
</body>
</html>
