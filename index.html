<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}

*{box-sizing:border-box;margin:0;padding:0;outline:none;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;line-height:1.5;}

/* Sidebar */
#sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:all .3s ease;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;margin:2px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);transition:all .2s;font-weight:500;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(79,142,247,0.3);}

/* Layout */
#main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative;}
#header{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:90;}
#content{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth;}

/* Views & Animations */
.view{display:none;animation:viewFade .3s ease-out;height:100%;}
.view.active{display:block;}
@keyframes viewFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Stats Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent);}
.stat-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--text);}

/* Data Tables */
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;text-align:left;}
th{background:var(--surface2);padding:14px 16px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:14px 16px;border-bottom:1px solid var(--border);color:var(--text2);transition:all .2s;}
tr:hover td{background:rgba(255,255,255,0.02);color:var(--text);}

/* AI Assistant Panel */
#ai-panel{position:fixed;bottom:24px;right:24px;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;z-index:1000;transition:all .3s cubic-bezier(0.4,0,0.2,1);transform:translateY(0);}
.ai-header{padding:16px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:var(--radius) var(--radius) 0 0;}
.ai-body{height:350px;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:12px;}
.ai-bubble{padding:10px 14px;border-radius:14px;max-width:85%;font-size:13px;line-height:1.4;}
.ai-user{align-self:flex-end;background:var(--accent);color:white;border-bottom-right-radius:2px;}
.ai-bot{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:2px;}

/* Modals (შენი ორიგინალი დიდი ფორმები) */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:650px;border:1px solid var(--border);box-shadow:var(--shadow);animation:modalIn .3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:24px;max-height:80vh;overflow-y:auto;}

/* Form Elements */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-group{display:flex;flex-direction:column;gap:8px;}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:var(--radius-sm);transition:all .2s;}
input:focus{border-color:var(--accent);background:var(--surface3);}
.btn{padding:12px 20px;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* Auth Screen */
#login-layer{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-card{background:var(--surface);padding:40px;border-radius:var(--radius);border:1px solid var(--border);width:100%;max-width:380px;text-align:center;box-shadow:var(--shadow);}
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="color:var(--accent); margin-bottom:10px;">სკოლა №26</h2>
        <input type="email" id="u-email" placeholder="ელ-ფოსტა">
        <input type="password" id="u-pass" placeholder="პაროლი">
        <button onclick="handleSignIn()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700; margin-top:10px;">ავტორიზაცია</button>
        <p id="auth-err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app-wrapper" style="display:none; width:100%; height:100vh;">
    <aside id="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border);">
            <div style="font-size:28px; font-weight:700; color:var(--accent);">№26</div>
        </div>
        <nav style="flex:1; padding:15px;">
            <div class="nav-item active" onclick="showView('dashboard', this)" style="padding:10px; cursor:pointer;">📊 სტატისტიკა</div>
            <div class="nav-item" onclick="showView('students', this)" style="padding:10px; cursor:pointer;">👥 მოსწავლეები</div>
            <div class="nav-item" onclick="showView('teachers', this)" style="padding:10px; cursor:pointer;">👩‍🏫 პედაგოგები</div>
            <div class="nav-item" onclick="showView('finance', this)" style="padding:10px; cursor:pointer;">💰 გადახდები</div>
        </nav>
        <div onclick="logOut()" style="padding:20px; border-top:1px solid var(--border); color:var(--text3); cursor:pointer;">🚪 გამოსვლა</div>
    </aside>

    <main id="main">
        <div id="content">
            <div id="view-dashboard" class="view active">
                <div id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px;"></div>
                <div style="margin-top:24px; background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border);">
                    <canvas id="mainChart" height="120"></canvas>
                </div>
            </div>

            <div id="view-students" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>მოსწავლეები</h2>
                    <button onclick="openModal('student')" style="padding:10px 20px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer;">+ დამატება</button>
                </div>
                <div id="students-table-wrap"></div>
            </div>
        </div>

        <div id="ai-panel">
            <div class="ai-header" onclick="toggleAI()"><span>🤖 AI ასისტენტი</span><span>▼</span></div>
            <div class="ai-body" id="ai-messages"></div>
            <div class="ai-input-area">
                <input type="text" id="ai-input" style="flex:1; background:var(--surface3); border:none; color:white; padding:10px; border-radius:8px;" placeholder="ჰკითხეთ AI-ს...">
                <button onclick="askAI()" style="background:var(--accent); border:none; padding:10px 15px; border-radius:8px; color:white;">🚀</button>
            </div>
        </div>
    </main>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-header"><h3 id="modal-title">მონაცემების შეყვანა</h3><span onclick="closeModal()" style="cursor:pointer;">✕</span></div>
        <div class="modal-body">
            <form id="main-form">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div><label style="font-size:11px; color:var(--text3)">სახელი</label><input type="text" id="f-name" style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:6px;" required></div>
                    <div><label style="font-size:11px; color:var(--text3)">გვარი</label><input type="text" id="l-name" style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:6px;" required></div>
                    <div><label style="font-size:11px; color:var(--text3)">პირადი ნომერი</label><input type="text" id="p-id" style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:6px;"></div>
                    <div><label style="font-size:11px; color:var(--text3)">სქესი</label><select id="gender" style="width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:6px;"><option value="male">მამრობითი</option><option value="female">მდედრობითი</option></select></div>
                </div>
                <button type="submit" style="width:100%; margin-top:24px; padding:14px; background:var(--green); border:none; border-radius:8px; color:white; font-weight:700; cursor:pointer;">შენახვა</button>
            </form>
        </div>
    </div>
</div>

<script>
const S_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
const _supabase = supabase.createClient(S_URL, S_KEY);

let state = { students: [], teachers: [], departments: [], payments: [] };

window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'flex';
        await loadRemoteData();
    }
};

async function handleSignIn() {
    const e = document.getElementById('u-email').value;
    const p = document.getElementById('u-pass').value;
    const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
    if (error) document.getElementById('auth-err').innerText = "წვდომა უარყოფილია!";
    else location.reload();
}

async function loadRemoteData() {
    const { data } = await _supabase.from('school_configs').select('data').eq('config_name', 'production_v1').maybeSingle();
    if (data) state = data.data;
    renderAll();
}

async function sync() {
    await _supabase.from('school_configs').upsert({ config_name: 'production_v1', data: state });
    renderAll();
}

/* --- შენი ორიგინალი ფუნქციები (აღდგენილი) --- */
function renderAll() {
    // Stats
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div style="color:var(--text3); font-size:12px;">მოსწავლე</div><div style="font-size:28px; font-weight:700;">${state.students.length}</div></div>
        <div class="stat-card"><div style="color:var(--text3); font-size:12px;">პედაგოგი</div><div style="font-size:28px; font-weight:700;">${state.teachers.length}</div></div>
    `;

    // Table
    let html = '<table class="data-table"><thead><tr><th>მოსწავლე</th><th>პირადი №</th><th>მოქმედება</th></tr></thead><tbody>';
    state.students.forEach((s, i) => {
        html += `<tr><td>${s.fn} ${s.ln}</td><td>${s.pid || '-'}</td><td><button onclick="del(${i})" style="background:none; border:none; cursor:pointer; color:var(--red);">🗑️</button></td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('students-table-wrap').innerHTML = html;
}

function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('main-form').reset(); }

document.getElementById('main-form').onsubmit = async (e) => {
    e.preventDefault();
    state.students.push({
        fn: document.getElementById('f-name').value,
        ln: document.getElementById('l-name').value,
        pid: document.getElementById('p-id').value,
        gen: document.getElementById('gender').value
    });
    await sync();
    closeModal();
};

function del(i) { if(confirm('წავშალოთ?')) { state.students.splice(i, 1); sync(); } }
function showView(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

function askAI() {
    const q = document.getElementById('ai-input').value;
    const box = document.getElementById('ai-messages');
    if(!q) return;
    box.innerHTML += `<div style="text-align:right; color:var(--text2); margin-bottom:10px;">${q}</div>`;
    let ans = q.includes('რამდენი') ? `სისტემაშია ${state.students.length} მოსწავლე.` : "ამაზე პასუხი არ მაქვს.";
    box.innerHTML += `<div style="color:var(--accent); margin-bottom:15px;">🤖 ${ans}</div>`;
    document.getElementById('ai-input').value = '';
}

async function logOut() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
