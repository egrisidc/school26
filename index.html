<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- შენი ორიგინალი CSS (1-ში-1) --- */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}
* { box-sizing:border-box; margin:0; padding:0; outline:none; }
body { font-family:'Noto Sans Georgian', sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

/* Sidebar, Main, Content სტილები შენი ფაილიდან */
#sidebar { width:220px; min-width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; }
.sidebar-logo { padding:20px 16px 16px; border-bottom:1px solid var(--border); }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); cursor:pointer; font-size:13px; color:var(--text2); transition:all .15s; margin-bottom:1px; }
.nav-item.active { background:var(--accent); color:#fff; }

/* შენი ორიგინალი ფორმების (Modals) სტილები */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:2000; }
.modal { background:var(--surface); border-radius:var(--radius); width:500px; max-width:95%; max-height:90vh; overflow-y:auto; border:1px solid var(--border); box-shadow:var(--shadow); }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-body { padding:20px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.form-group label { font-size:12px; color:var(--text3); text-transform:uppercase; }
.form-group input, .form-group select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:var(--radius-sm); }

/* Auth Layer */
#auth-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
.auth-card { background:var(--surface); padding:40px; border-radius:var(--radius); border:1px solid var(--border); width:350px; text-align:center; }
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--accent); margin-bottom:10px;">სკოლა №26</h2>
        <input type="email" id="u-email" placeholder="ელ-ფოსტა" style="width:100%; padding:12px; margin:10px 0; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;">
        <input type="password" id="u-pass" placeholder="პაროლი" style="width:100%; padding:12px; margin:10px 0; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;">
        <button onclick="handleSignIn()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700;">შესვლა</button>
        <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="app-content" style="display:none; width:100%; height:100vh;">
    <aside id="sidebar">
        <div class="sidebar-logo"><div class="school-num" style="font-size:28px; font-weight:700; color:var(--accent);">№26</div></div>
        <nav class="sidebar-nav" style="flex:1; padding:15px;">
            <div class="nav-item active" onclick="showView('dashboard', this)">📊 სტატისტიკა</div>
            <div class="nav-item" onclick="showView('students', this)">👥 მოსწავლეები</div>
            <div class="nav-item" onclick="showView('teachers', this)">👩‍🏫 პედაგოგები</div>
            <div class="nav-item" onclick="showView('finance', this)">💰 გადახდები</div>
        </nav>
        <div style="padding:15px; border-top:1px solid var(--border); cursor:pointer; color:var(--text3);" onclick="logout()">🚪 გამოსვლა</div>
    </aside>

    <main style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div id="content" style="flex:1; padding:24px; overflow-y:auto;">
            <div id="view-dashboard" class="view active">
                <div class="stats-row" id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px;"></div>
                <div style="margin-top:25px; background:var(--surface); border:1px solid var(--border); padding:20px; border-radius:12px;">
                    <canvas id="main-chart" height="100"></canvas>
                </div>
            </div>

            <div id="view-students" class="view">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h2>მოსწავლეები</h2>
                    <button onclick="openModal('student')" style="padding:10px 20px; background:var(--accent); border:none; border-radius:8px; color:white; cursor:pointer;">+ დამატება</button>
                </div>
                <div id="students-table-wrap"></div>
            </div>
        </div>
    </main>
</div>

<div id="modal-container" class="modal-overlay">
    <div class="modal">
        <div class="modal-header"><h3 id="modal-title">მოსწავლის დამატება</h3><span onclick="closeModal()" style="cursor:pointer;">✕</span></div>
        <div class="modal-body">
            <form id="main-form">
                <div class="form-grid">
                    <div class="form-group"><label>სახელი</label><input type="text" id="f-name" required></div>
                    <div class="form-group"><label>გვარი</label><input type="text" id="l-name" required></div>
                    <div class="form-group"><label>პირადი ნომერი</label><input type="text" id="p-id"></div>
                    <div class="form-group"><label>სქესი</label>
                        <select id="f-gender"><option value="male">მამრობითი</option><option value="female">მდედრობითი</option></select>
                    </div>
                </div>
                <button type="submit" style="width:100%; margin-top:20px; padding:12px; background:var(--green); border:none; border-radius:8px; color:white; font-weight:700; cursor:pointer;">შენახვა</button>
            </form>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = { students: [], teachers: [], departments: [], payments: [] };
let currentView = 'dashboard';

window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        await loadCloudData();
    }
};

async function handleSignIn() {
    const e = document.getElementById('u-email').value;
    const p = document.getElementById('u-pass').value;
    const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
    if (error) document.getElementById('err').innerText = "შეცდომა!";
    else location.reload();
}

async function loadCloudData() {
    const { data } = await _supabase.from('school_configs').select('data').eq('config_name', 'production_backup').maybeSingle();
    if (data && data.data) state = data.data;
    renderUI();
}

async function sync() {
    await _supabase.from('school_configs').upsert({ config_name: 'production_backup', data: state });
    renderUI();
}

function renderUI() {
    // Stats
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card" style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border);">
            <div class="stat-label">მოსწავლე</div><div class="stat-value" style="font-size:28px; font-weight:700;">${state.students.length}</div>
        </div>
        <div class="stat-card" style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border);">
            <div class="stat-label">პედაგოგი</div><div class="stat-value" style="font-size:28px; font-weight:700;">${state.teachers.length}</div>
        </div>
    `;

    // Table (შენი ორიგინალი დიზაინით)
    let tableHtml = '<table style="width:100%; border-collapse:collapse; background:var(--surface); border-radius:12px; overflow:hidden;">';
    tableHtml += '<thead style="background:var(--surface2)"><tr><th style="padding:15px; text-align:left;">სახელი</th><th style="padding:15px; text-align:left;">გვარი</th><th style="padding:15px; text-align:left;">პირადი №</th><th style="padding:15px;">მოქმედება</th></tr></thead><tbody>';
    state.students.forEach((s, i) => {
        tableHtml += `<tr style="border-bottom:1px solid var(--border)"><td style="padding:15px;">${s.firstName}</td><td style="padding:15px;">${s.lastName}</td><td style="padding:15px;">${s.personalId || '-'}</td><td style="padding:15px; text-align:center;"><button onclick="deleteItem('students', ${i})" style="background:none; border:none; cursor:pointer;">🗑️</button></td></tr>`;
    });
    tableHtml += '</tbody></table>';
    document.getElementById('students-table-wrap').innerHTML = tableHtml;
}

// Modal Logic
function openModal(type) {
    document.getElementById('modal-container').style.display = 'flex';
    document.getElementById('main-form').onsubmit = (e) => {
        e.preventDefault();
        const newItem = {
            firstName: document.getElementById('f-name').value,
            lastName: document.getElementById('l-name').value,
            personalId: document.getElementById('p-id').value,
            gender: document.getElementById('f-gender').value
        };
        state[type + 's'].push(newItem);
        sync();
        closeModal();
    };
}

function closeModal() { document.getElementById('modal-container').style.display = 'none'; document.getElementById('main-form').reset(); }

function deleteItem(type, i) { if(confirm('ნამდვილად წავშალოთ?')) { state[type].splice(i, 1); sync(); } }

function showView(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
