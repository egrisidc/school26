<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}

*{box-sizing:border-box;margin:0;padding:0;outline:none;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;line-height:1.5;}

/* Sidebar */
#sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:all .3s ease;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;margin:2px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);transition:all .2s;font-weight:500;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(79,142,247,0.3);}

/* Layout */
#main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative;}
#header{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:90;}
#content{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth;}

/* Views & Animations */
.view{display:none;animation:viewFade .3s ease-out;height:100%;}
.view.active{display:block;}
@keyframes viewFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Stats Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent);}
.stat-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;color:var(--text);}

/* Data Tables */
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;text-align:left;}
th{background:var(--surface2);padding:14px 16px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);}
td{padding:14px 16px;border-bottom:1px solid var(--border);color:var(--text2);transition:all .2s;}
tr:hover td{background:rgba(255,255,255,0.02);color:var(--text);}

/* AI Assistant Panel */
#ai-panel{position:fixed;bottom:24px;right:24px;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;z-index:1000;transition:all .3s cubic-bezier(0.4,0,0.2,1);}
.ai-header{padding:16px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:var(--radius) var(--radius) 0 0;}
.ai-body{height:350px;overflow-y:auto;padding:16px;background:var(--bg);display:flex;flex-direction:column;gap:12px;}
.ai-bubble{padding:10px 14px;border-radius:14px;max-width:85%;font-size:13px;line-height:1.4;}
.ai-user{align-self:flex-end;background:var(--accent);color:white;border-bottom-right-radius:2px;}
.ai-bot{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:2px;}
.ai-input-area{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--surface);}
.ai-input-area input{flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;}
.ai-input-area button{background:var(--accent);border:none;padding:10px 15px;border-radius:8px;color:white;cursor:pointer;font-weight:600;transition:all .2s;}
.ai-input-area button:hover{filter:brightness(1.1);}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:650px;border:1px solid var(--border);box-shadow:var(--shadow);animation:modalIn .3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{margin:0;}
.modal-body{padding:24px;max-height:80vh;overflow-y:auto;}
.close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text2);transition:all .2s;}
.close-btn:hover{color:var(--text);}

/* Form Elements */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:8px;}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);}
.form-group input,
.form-group select,
.form-group textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:var(--radius-sm);transition:all .2s;width:100%;}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{border-color:var(--accent);background:var(--surface3);}
.btn{padding:12px 20px;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--accent);color:white;width:100%;}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-danger{background:var(--red);color:white;}
.btn-danger:hover{filter:brightness(1.1);}

/* Sidebar Logo */
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border);}
.sidebar-logo div{font-size:28px;font-weight:700;color:var(--accent);}

/* Sidebar Nav */
.sidebar-nav{flex:1;padding:15px;}
.sidebar-footer{padding:20px;border-top:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .2s;}
.sidebar-footer:hover{color:var(--text);}

/* Auth Screen */
#auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-box{background:var(--surface);padding:40px;border-radius:var(--radius);border:1px solid var(--border);width:100%;max-width:380px;text-align:center;box-shadow:var(--shadow);}
.auth-box h2{color:var(--accent);margin-bottom:20px;}
.auth-box input{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;margin-bottom:12px;transition:all .2s;}
.auth-box input:focus{border-color:var(--accent);background:var(--surface3);}
.auth-box button{width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:700;transition:all .2s;}
.auth-box button:hover{filter:brightness(1.1);}
#auth-err{color:var(--red);font-size:12px;margin-top:10px;display:none;}

/* Titles */
h2{font-size:24px;font-weight:700;color:var(--text);margin-bottom:20px;}
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2>სკოლა №26</h2>
        <input type="email" id="u-email" placeholder="ელ-ფოსტა">
        <input type="password" id="u-pass" placeholder="პაროლი">
        <button onclick="handleSignIn()">ავტორიზაცია</button>
        <div id="auth-err"></div>
    </div>
</div>

<div id="app-wrapper" style="display:none; width:100%; height:100vh; flex:1;">
    <aside id="sidebar">
        <div class="sidebar-logo">
            <div>№26</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item active" onclick="showView('dashboard', this)">📊 სტატისტიკა</div>
            <div class="nav-item" onclick="showView('students', this)">👥 მოსწავლეები</div>
            <div class="nav-item" onclick="showView('teachers', this)">👩‍🏫 პედაგოგები</div>
            <div class="nav-item" onclick="showView('finance', this)">💰 გადახდები</div>
        </nav>
        <div class="sidebar-footer" onclick="logOut()">🚪 გამოსვლა</div>
    </aside>

    <main id="main">
        <div id="content">
            <!-- Dashboard View -->
            <div id="view-dashboard" class="view active">
                <h2>სტატისტიკა</h2>
                <div id="stats-grid" class="stats-grid"></div>
                <div style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border); margin-top:24px;">
                    <canvas id="mainChart" height="120"></canvas>
                </div>
            </div>

            <!-- Students View -->
            <div id="view-students" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0;">მოსწავლეები</h2>
                    <button class="btn btn-primary" onclick="openModal('student')" style="width:auto;">+ დამატება</button>
                </div>
                <div class="table-container" id="students-table-wrap"></div>
            </div>

            <!-- Teachers View -->
            <div id="view-teachers" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0;">პედაგოგები</h2>
                    <button class="btn btn-primary" onclick="openModal('teacher')" style="width:auto;">+ დამატება</button>
                </div>
                <div class="table-container" id="teachers-table-wrap"></div>
            </div>

            <!-- Finance View -->
            <div id="view-finance" class="view">
                <h2>გადახდები</h2>
                <div class="table-container" id="finance-table-wrap"></div>
            </div>
        </div>

        <!-- AI Assistant Panel -->
        <div id="ai-panel">
            <div class="ai-header" onclick="toggleAI()">
                <span>🤖 AI ასისტენტი</span>
                <span id="ai-toggle-icon">▼</span>
            </div>
            <div class="ai-body" id="ai-messages"></div>
            <div class="ai-input-area">
                <input type="text" id="ai-input" placeholder="ჰკითხეთ AI-ს...">
                <button onclick="askAI()">🚀</button>
            </div>
        </div>
    </main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">მონაცემების შეყვანა</h3>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <form id="main-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>სახელი</label>
                        <input type="text" id="f-name" required>
                    </div>
                    <div class="form-group">
                        <label>გვარი</label>
                        <input type="text" id="l-name" required>
                    </div>
                    <div class="form-group">
                        <label>პირადი ნომერი</label>
                        <input type="text" id="p-id">
                    </div>
                    <div class="form-group">
                        <label>სქესი</label>
                        <select id="gender">
                            <option value="male">მამრობითი</option>
                            <option value="female">მდედრობითი</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:24px;">შენახვა</button>
            </form>
        </div>
    </div>
</div>

<script>
// ⚠️ IMPORTANT: Replace with environment variables in production!
// Store these securely - never commit to git
const S_URL = import.meta.env.VITE_SUPABASE_URL || 'https://xvgidwsbyofptozwsohf.supabase.co';
const S_KEY = import.meta.env.VITE_SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';

const _supabase = supabase.createClient(S_URL, S_KEY);

let state = { students: [], teachers: [], departments: [], payments: [] };
let chart = null;

/**
 * Initialize app on page load
 */
window.onload = async () => {
    try {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-wrapper').style.display = 'flex';
            await loadRemoteData();
        }
    } catch (err) {
        console.error('Init error:', err);
        showError('აპლიკაცია ვერ ჩაიტვირთა');
    }
};

/**
 * Handle sign in
 */
async function handleSignIn() {
    try {
        const e = document.getElementById('u-email').value.trim();
        const p = document.getElementById('u-pass').value;
        
        if (!e || !p) {
            showError('შეიყვანეთ ელ-ფოსტა და პაროლი');
            return;
        }

        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (error) {
            showError('წვდომა უარყოფილია! ' + error.message);
        } else {
            location.reload();
        }
    } catch (err) {
        console.error('Sign in error:', err);
        showError('ავტორიზაცია წარუმატებელი');
    }
}

/**
 * Show error message
 */
function showError(msg) {
    const errEl = document.getElementById('auth-err');
    errEl.innerText = msg;
    errEl.style.display = 'block';
    setTimeout(() => errEl.style.display = 'none', 4000);
}

/**
 * Load data from Supabase
 */
async function loadRemoteData() {
    try {
        const { data, error } = await _supabase
            .from('school_configs')
            .select('data')
            .eq('config_name', 'production_v1')
            .maybeSingle();
        
        if (error) throw error;
        if (data) state = data.data;
        
        renderAll();
    } catch (err) {
        console.error('Load error:', err);
        showError('მონაცემები ვერ ჩაიტვირთა');
    }
}

/**
 * Sync state to Supabase
 */
async function sync() {
    try {
        await _supabase
            .from('school_configs')
            .upsert({ config_name: 'production_v1', data: state });
        renderAll();
    } catch (err) {
        console.error('Sync error:', err);
        showError('მონაცემები ვერ შენახა');
    }
}

/**
 * Render all components
 */
function renderAll() {
    renderStats();
    renderStudentsTable();
    renderTeachersTable();
    renderChart();
}

/**
 * Render statistics cards
 */
function renderStats() {
    const statsGrid = document.getElementById('stats-grid');
    const boyCount = state.students.filter(s => s.gen === 'male').length;
    const girlCount = state.students.filter(s => s.gen === 'female').length;
    
    statsGrid.innerHTML = `
        <div class="stat-card">
            <div class="stat-label">სულ მოსწავლე</div>
            <div class="stat-value">${state.students.length}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ბიჭი</div>
            <div class="stat-value" style="color:var(--boy);">${boyCount}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">გოგო</div>
            <div class="stat-value" style="color:var(--girl);">${girlCount}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">���ედაგოგი</div>
            <div class="stat-value">${state.teachers.length}</div>
        </div>
    `;
}

/**
 * Render students table
 */
function renderStudentsTable() {
    let html = '<table><thead><tr><th>სახელი</th><th>პირადი №</th><th>სქესი</th><th>მოქმედება</th></tr></thead><tbody>';
    
    state.students.forEach((s, i) => {
        const genderLabel = s.gen === 'male' ? '👦 ბიჭი' : '👧 გოგო';
        html += `
            <tr>
                <td>${s.fn} ${s.ln}</td>
                <td>${s.pid || '-'}</td>
                <td>${genderLabel}</td>
                <td><button class="btn btn-danger" onclick="deleteStudent(${i})" style="padding:6px 10px; font-size:12px;">🗑️ წაშლა</button></td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    document.getElementById('students-table-wrap').innerHTML = html;
}

/**
 * Render teachers table
 */
function renderTeachersTable() {
    let html = '<table><thead><tr><th>სახელი</th><th>სპეციალობა</th><th>მოქმედება</th></tr></thead><tbody>';
    
    state.teachers.forEach((t, i) => {
        html += `
            <tr>
                <td>${t.fn} ${t.ln}</td>
                <td>${t.spec || '-'}</td>
                <td><button class="btn btn-danger" onclick="deleteTeacher(${i})" style="padding:6px 10px; font-size:12px;">🗑️ წაშლა</button></td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    document.getElementById('teachers-table-wrap').innerHTML = html;
}

/**
 * Render chart
 */
function renderChart() {
    const ctx = document.getElementById('mainChart');
    if (!ctx) return;
    
    if (chart) chart.destroy();
    
    const boyCount = state.students.filter(s => s.gen === 'male').length;
    const girlCount = state.students.filter(s => s.gen === 'female').length;
    
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['ბიჭი', 'გოგო'],
            datasets: [{
                label: 'მოსწავლეები',
                data: [boyCount, girlCount],
                backgroundColor: ['rgba(79, 142, 247, 0.8)', 'rgba(247, 111, 176, 0.8)'],
                borderColor: ['rgb(79, 142, 247)', 'rgb(247, 111, 176)'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    labels: { color: 'rgba(232, 234, 246, 0.8)' }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: 'rgba(232, 234, 246, 0.8)' },
                    grid: { color: 'rgba(46, 51, 82, 0.3)' }
                },
                x: {
                    ticks: { color: 'rgba(232, 234, 246, 0.8)' },
                    grid: { color: 'rgba(46, 51, 82, 0.3)' }
                }
            }
        }
    });
}

/**
 * Open modal
 */
function openModal(type) {
    const modal = document.getElementById('modal-overlay');
    const title = document.getElementById('modal-title');
    
    if (type === 'student') {
        title.innerText = 'ახალი მოსწავლე';
    } else if (type === 'teacher') {
        title.innerText = 'ახალი პედაგოგი';
    }
    
    modal.classList.add('active');
    document.getElementById('main-form').dataset.type = type;
    document.getElementById('main-form').reset();
}

/**
 * Close modal
 */
function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('main-form').reset();
}

/**
 * Handle form submission
 */
document.getElementById('main-form').onsubmit = async (e) => {
    e.preventDefault();
    
    try {
        const type = document.getElementById('main-form').dataset.type || 'student';
        
        if (type === 'student') {
            state.students.push({
                fn: document.getElementById('f-name').value,
                ln: document.getElementById('l-name').value,
                pid: document.getElementById('p-id').value,
                gen: document.getElementById('gender').value
            });
        } else if (type === 'teacher') {
            state.teachers.push({
                fn: document.getElementById('f-name').value,
                ln: document.getElementById('l-name').value,
                spec: document.getElementById('p-id').value,
                gen: document.getElementById('gender').value
            });
        }
        
        await sync();
        closeModal();
    } catch (err) {
        console.error('Submit error:', err);
        showError('შენახვა წარუმატებელი');
    }
};

/**
 * Delete student
 */
function deleteStudent(i) {
    if (confirm('ნამდვილად წავშალოთ ეს მოსწავლე?')) {
        state.students.splice(i, 1);
        sync();
    }
}

/**
 * Delete teacher
 */
function deleteTeacher(i) {
    if (confirm('ნამდვილად წავშალოთ ეს პედაგოგი?')) {
        state.teachers.splice(i, 1);
        sync();
    }
}

/**
 * Show/hide view
 */
function showView(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

/**
 * Toggle AI panel
 */
function toggleAI() {
    const panel = document.getElementById('ai-panel');
    const body = document.querySelector('.ai-body');
    const icon = document.getElementById('ai-toggle-icon');
    
    if (body.style.display === 'none') {
        body.style.display = 'flex';
        icon.innerText = '▼';
    } else {
        body.style.display = 'none';
        icon.innerText = '▶';
    }
}

/**
 * Ask AI
 */
function askAI() {
    try {
        const q = document.getElementById('ai-input').value.trim();
        const box = document.getElementById('ai-messages');
        
        if (!q) return;
        
        // User message
        const userMsg = document.createElement('div');
        userMsg.className = 'ai-bubble ai-user';
        userMsg.innerText = q;
        box.appendChild(userMsg);
        
        // AI response
        let answer = 'ამაზე პასუხი არ მაქვს.';
        if (q.toLowerCase().includes('რამდენი') || q.toLowerCase().includes('რამდენ')) {
            answer = `სისტემაში არის ${state.students.length} მოსწავლე და ${state.teachers.length} პედაგოგი.`;
        } else if (q.toLowerCase().includes('ბიჭი')) {
            const boyCount = state.students.filter(s => s.gen === 'male').length;
            answer = `სულ ${boyCount} ბიჭი სწავლობს.`;
        } else if (q.toLowerCase().includes('გოგო')) {
            const girlCount = state.students.filter(s => s.gen === 'female').length;
            answer = `სულ ${girlCount} გოგო სწავლობს.`;
        }
        
        const botMsg = document.createElement('div');
        botMsg.className = 'ai-bubble ai-bot';
        botMsg.innerText = '🤖 ' + answer;
        box.appendChild(botMsg);
        
        box.scrollTop = box.scrollHeight;
        document.getElementById('ai-input').value = '';
    } catch (err) {
        console.error('AI error:', err);
    }
}

/**
 * Log out
 */
async function logOut() {
    try {
        await _supabase.auth.signOut();
        location.reload();
    } catch (err) {
        console.error('Logout error:', err);
    }
}

// Close modal on Escape key
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});
