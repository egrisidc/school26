<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/></head>
<body>
<div id="out"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
try {
  var r = ReactDOM.createRoot(document.getElementById('out'));
  r.render(React.createElement('h2',{style:{color:'green'}},'React OK!'));
} catch(e) {
  document.getElementById('out').innerHTML='<h2 style="color:red">Error: '+e.message+'</h2>';
}
</script>
</body>
</html>
